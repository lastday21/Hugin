repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest --cov=hugin --cov-report=term-missing
        language: system
        pass_filenames: false
